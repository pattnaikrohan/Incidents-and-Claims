name: Build and deploy Python app to Azure Web App - incidents-and-claims

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Prepare clean deployment folder (CRITICAL)
      - name: Prepare deployment folder
        run: |
          mkdir deploy
          cp backend/main.py deploy/
          cp backend/requirements.txt deploy/
          cp -r backend/app deploy/

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Download artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: incidents-and-claims
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_0674D84D33534B478017F4629F8EBB62 }}
