name: Build and deploy Python app to Azure Web App - incidents-and-claims

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python (optional, for validation only)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # (Optional sanity check - can remove later)
      - name: Verify requirements exists
        run: |
          ls backend
          cat backend/requirements.txt

      # Upload ONLY backend contents (flattened)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/*
            !backend/antenv/
            !backend/__pycache__/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Download artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: incidents-and-claims
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_0674D84D33534B478017F4629F8EBB62 }}
