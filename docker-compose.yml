version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: incident_admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: incident_claims_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    command: azurite -l /data --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  solr:
    image: solr:9
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr

volumes:
  pgdata:
  azurite_data:
  solr_data:
